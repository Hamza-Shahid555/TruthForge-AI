services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT}
      - DATABASE_URL=postgresql://truthforge:truthforge@db:5432/truthforge
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=truthforge
      - POSTGRES_PASSWORD=truthforge
      - POSTGRES_DB=truthforge
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
